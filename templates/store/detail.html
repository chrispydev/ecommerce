{% extends 'base.html' %}

{% block content %}
<section class="detail">
    <img class="" src="{{product.product_image}}" alt="" srcset="">
    {% comment %}
    <img class="shadow" src="{{product.product_image.url}}" alt="" srcset="">
    {% endcomment %}

    <div class="product__detail">
        <h4>{{product.name}}</h4>
        <p>{{product.description}}</p>
        <h5>GHS{{product.price}}</h5>
        <button data-product-id="{{product.id}}" class="shadow add-to-cart-btn" id="detail__add" type="button">ADD TO
            CART</button>
    </div>
</section>
{% endblock %}
